<!DOCTYPE html>
<html>
<head><title>Todo App</title></head>
<body>
  <h1>My Todo List Testing Pipeline</h1>

  <form action="/add" method="POST">
    <input type="text" name="task" placeholder="Tambah task baru..." required>
     <input type="time-local" name="jadwal" placeholder="Jam Berapa..." required>
    <button type="submit">Tambah</button>
  </form>

  <ul>
    {% for task in tasks %}
  <li>
    {{ task['title']}} - jam : {{task['jadwal']}}
    <a href="/delete/{{ task['id'] }}">Hapus</a>
  </li>
    {% endfor %}
  </ul>
</body>
</html>
