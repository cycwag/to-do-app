<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; min-height: 100vh; padding: 2rem; font-family: system-ui, sans-serif; color: #e5e7eb; }
    .container { max-width: 640px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 22px; font-weight: 500; color: #fff; }
    .header p { color: #6b7280; font-size: 13px; margin-top: 4px; }
    .form-wrap { background: #1a1d27; border: 0.5px solid #2d3047; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: flex; gap: 10px; }
    input[type="text"], input[type="time-local"] { flex: 1; background: #0f1117; border: 0.5px solid #2d3047; border-radius: 8px; padding: 10px 14px; color: #e5e7eb; font-size: 14px; outline: none; color-scheme: dark; }
    input:focus { border-color: #4f46e5; }
    .btn-add { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
    .btn-add:hover { background: #4338ca; }
    .section-label { color: #6b7280; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
    .task-item { background: #1a1d27; border: 0.5px solid #2d3047; border-radius: 10px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .task-left { display: flex; align-items: center; gap: 12px; }
    .task-dot { width: 8px; height: 8px; border-radius: 50%; background: #4f46e5; flex-shrink: 0; }
    .task-title { color: #e5e7eb; font-size: 14px; font-weight: 500; }
    .task-time { color: #6b7280; font-size: 12px; margin-top: 2px; }
    .btn-del { background: transparent; border: 0.5px solid #2d3047; border-radius: 6px; color: #6b7280; font-size: 12px; padding: 4px 10px; cursor: pointer; text-decoration: none; }
    .btn-del:hover { border-color: #e24b4a; color: #e24b4a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Todo List testt</h1>
      <p>Atur jadwal kegiatan kamu</p>
    </div>

    <div class="form-wrap">
      <form action="/add" method="POST">
        <div class="form-row">
          <input type="text" name="task" placeholder="Nama kegiatan..." required>
          <input type="time-local" name="jadwal" placeholder="Jam Berapa" required>
        </div>
        <br>
        <button type="submit" class="btn-add">Tambah task</button>
      </form>
    </div>

    <div class="section-label">Jadwal kamu</div>

    {% for task in tasks %}
    <div class="task-item">
      <div class="task-left">
        <div class="task-dot"></div>
        <div>
          <div class="task-title">{{ task['title'] }}</div>
          <div class="task-time">{{ task['jadwal'] }}</div>
        </div>
      </div>
      <a href="/delete/{{ task['id'] }}" class="btn-del">Hapus</a>
    </div>
    {% endfor %}
  </div>
</body>
</html>
